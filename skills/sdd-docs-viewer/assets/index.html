<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Documentación técnica de flujos DM — viewer estático con Markdown y Mermaid" />
    <title>Flow Docs Hub</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="layout">
      <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar" title="Menú">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div id="sidebar-overlay" class="sidebar-overlay"></div>

      <aside id="sidebar" class="sidebar">
        <header class="sidebar-header">
          <h1>Flow Docs</h1>
          <p>Documentación técnica</p>
        </header>
        <div class="search-box">
          <input type="search" id="search-input" placeholder="Buscar..." />
        </div>
        <nav id="doc-nav" aria-label="Documentation index"></nav>
      </aside>

      <main class="content-area">
        <header class="content-header">
          <h2 id="doc-title">Loading...</h2>
          <div id="doc-meta" class="meta-info"></div>
        </header>
        
        <div id="toc" class="toc"></div>
        <div id="status" class="status-msg"></div>
        <article id="doc-content" class="markdown-body"></article>
      </main>

      <button id="back-to-top" class="back-to-top" aria-label="Volver arriba" title="Volver arriba">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="18 15 12 9 6 15"/>
        </svg>
      </button>
    </div>

    <noscript>
      <p style="padding:2rem;text-align:center;color:#666">
        Este visor requiere JavaScript para renderizar la documentación Markdown y los diagramas Mermaid.
      </p>
    </noscript>
  </body>
</html>
